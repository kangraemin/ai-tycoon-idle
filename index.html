<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Slime Ranch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/slimes.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Top Bar: Currency Display -->
    <div class="top-bar">
      <div class="currency-group">
        <div class="currency gold">
          <span class="material-symbols-outlined currency-icon fill-1">monetization_on</span>
          <span class="currency-value" id="gold-display">0</span>
        </div>
        <div class="currency gems">
          <span class="material-symbols-outlined currency-icon fill-1">diamond</span>
          <span class="currency-value" id="gems-display">0</span>
        </div>
      </div>
      <button class="settings-btn" onclick="showSettings()">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </div>

    <!-- Jelly Bar -->
    <div class="jelly-bar">
      <div class="jelly-left">
        <div class="jelly-icon-wrap">
          <span class="material-symbols-outlined jelly-icon">potted_plant</span>
        </div>
        <div class="jelly-info">
          <div class="jelly-label">Jelly Harvest</div>
          <div class="jelly-amount-row">
            <span class="jelly-amount" id="jelly-display">0</span>
          </div>
          <div class="jelly-rate"><span class="material-symbols-outlined jelly-bolt">bolt</span> <span id="jps-display">0/s</span></div>
        </div>
      </div>
      <button class="sell-btn" onclick="sellJelly()">Sell</button>
    </div>

    <!-- Screen Container -->
    <div class="screen-container">
      <!-- Ranch Screen -->
      <div class="screen active" id="screen-ranch">
        <div class="ranch-header">
          <h3 class="ranch-title">
            <span class="material-symbols-outlined">pets</span>
            Your Ranch
          </h3>
          <span class="ranch-slot-badge" id="ranch-slot-count"></span>
        </div>
        <div id="slime-grid"></div>
      </div>

      <!-- Upgrade Screen -->
      <div class="screen" id="screen-upgrade">
        <div id="upgrade-content"></div>
      </div>

      <!-- Gacha Screen -->
      <div class="screen" id="screen-gacha">
        <div id="gacha-content"></div>
      </div>

      <!-- Prestige Screen -->
      <div class="screen" id="screen-prestige">
        <div id="prestige-content"></div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="ranch">
        <div class="nav-icon-wrap">
          <span class="material-symbols-outlined fill-1">home</span>
        </div>
        <span class="nav-label">Ranch</span>
      </button>
      <button class="nav-btn" data-screen="upgrade">
        <div class="nav-icon-wrap">
          <span class="material-symbols-outlined">trending_up</span>
        </div>
        <span class="nav-label">Upgrade</span>
      </button>
      <button class="nav-btn" data-screen="gacha">
        <div class="nav-icon-wrap">
          <span class="material-symbols-outlined">featured_seasonal_and_gifts</span>
        </div>
        <span class="nav-label">Gacha</span>
      </button>
      <button class="nav-btn" data-screen="prestige">
        <div class="nav-icon-wrap">
          <span class="material-symbols-outlined">military_tech</span>
        </div>
        <span class="nav-label">Prestige</span>
      </button>
    </nav>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-message" id="modal-message"></div>
        <div class="modal-buttons" id="modal-buttons"></div>
      </div>
    </div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="js/format.js"></script>
  <script src="js/state.js"></script>
  <script src="js/slime.js"></script>
  <script src="js/production.js"></script>
  <script src="js/upgrade.js"></script>
  <script src="js/gacha.js"></script>
  <script src="js/prestige.js"></script>
  <script src="js/offline.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
