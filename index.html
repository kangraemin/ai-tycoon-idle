<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AI Tycoon</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/models.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/debug.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>body.ads-active .bottom-nav { padding-bottom: 60px; }</style>
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-63S1V7WF43"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-63S1V7WF43');
  </script>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "CLARITY_PROJECT_ID");
  </script>
</head>
<body>
  <div id="app">
    <!-- Top Bar: Currency Display -->
    <div class="top-bar">
      <div class="currency-group">
        <div class="currency loc">
          <span class="material-symbols-outlined currency-icon fill-1">code</span>
          <span class="currency-label">LoC</span>
          <span class="currency-value" id="loc-display">0</span>
          <span class="loc-rate-inline" id="lps-display">0/s</span>
        </div>
        <div class="currency compute">
          <span class="material-symbols-outlined currency-icon fill-1">memory</span>
          <span class="currency-label">Compute</span>
          <span class="currency-value" id="compute-display">0</span>
        </div>
        <div class="currency papers">
          <span class="material-symbols-outlined currency-icon fill-1">article</span>
          <span class="currency-label">Papers</span>
          <span class="currency-value" id="papers-display">0</span>
        </div>
        <div class="currency tokens">
          <span class="material-symbols-outlined currency-icon fill-1">confirmation_number</span>
          <span class="currency-label">Tokens</span>
          <span class="currency-value" id="tokens-display">0</span>
        </div>
      </div>
      <div class="top-bar-actions">
        <button class="compile-btn-mini" onclick="compileData()">Compile</button>
        <button class="settings-btn" onclick="showSettings()">
          <span class="material-symbols-outlined">settings</span>
        </button>
      </div>
    </div>

    <!-- Hint Banner -->
    <div id="hint-banner" class="hint-banner" style="display:none" onclick="if(this.dataset.screen) switchScreen(this.dataset.screen)"></div>

    <!-- Event Banner -->
    <div id="event-banner" class="event-banner" style="display:none"></div>

    <!-- Screen Container -->
    <div class="screen-container">
      <!-- Editor Screen -->
      <div class="screen active" id="screen-editor">
        <div id="editor-content"></div>
      </div>

      <!-- Models Screen -->
      <div class="screen" id="screen-models">
        <div class="editor-header">
          <h3 class="editor-title"><span class="material-symbols-outlined">smart_toy</span> AI Models</h3>
          <span class="gpu-slot-badge" id="model-slot-count"></span>
        </div>
        <div class="models-sub-tabs" id="models-sub-tabs">
          <button class="sub-tab active" data-subtab="models-grid" onclick="switchModelsSubTab('models-grid')">
            <span class="material-symbols-outlined">grid_view</span> Models
          </button>
          <button class="sub-tab sub-tab-locked" data-subtab="research" data-sub-unlock="papers" onclick="switchModelsSubTab('research')">
            <span class="material-symbols-outlined">science</span> Research
          </button>
          <button class="sub-tab sub-tab-locked" data-subtab="fusion" data-sub-unlock="fusion" onclick="switchModelsSubTab('fusion')">
            <span class="material-symbols-outlined">merge</span> Fusion
          </button>
        </div>
        <div class="models-sub-content">
          <div class="sub-panel active" id="sub-models-grid"><div id="model-grid"></div></div>
          <div class="sub-panel" id="sub-research"><div id="research-content"></div></div>
          <div class="sub-panel" id="sub-fusion"><div id="fusion-content"></div></div>
        </div>
      </div>

      <!-- Upgrade Screen -->
      <div class="screen" id="screen-upgrade">
        <div id="upgrade-content"></div>
      </div>

      <!-- Career Screen -->
      <div class="screen" id="screen-career">
        <div class="editor-header">
          <h3 class="editor-title"><span class="material-symbols-outlined">work</span> Career</h3>
        </div>
        <div class="models-sub-tabs" id="career-sub-tabs">
          <button class="sub-tab active" data-subtab="career-main" onclick="switchCareerSubTab('career-main')">
            <span class="material-symbols-outlined">work</span> Career
          </button>
          <button class="sub-tab" data-subtab="career-awards" onclick="switchCareerSubTab('career-awards')">
            <span class="material-symbols-outlined">emoji_events</span> Awards
          </button>
        </div>
        <div class="models-sub-content">
          <div class="sub-panel active" id="sub-career-main"><div id="career-content"></div></div>
          <div class="sub-panel" id="sub-career-awards"><div id="career-awards-content"></div></div>
        </div>
      </div>
    </div>

    <!-- Challenge Overlay -->
    <div id="challenge-overlay" class="challenge-overlay" style="display:none">
      <div class="challenge-content">
        <div class="challenge-header">
          <h2 id="challenge-title"></h2>
          <div class="challenge-timer" id="challenge-timer"></div>
        </div>
        <div id="challenge-body"></div>
        <div id="challenge-result" style="display:none"></div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="editor">
        <div class="nav-icon-wrap">
          <span class="material-symbols-outlined fill-1">terminal</span>
        </div>
        <span class="nav-label">Editor</span>
      </button>
      <button class="nav-btn" data-screen="models">
        <div class="nav-icon-wrap">
          <span class="material-symbols-outlined">smart_toy</span>
        </div>
        <span class="nav-label">Models</span>
      </button>
      <button class="nav-btn" data-screen="upgrade">
        <div class="nav-icon-wrap">
          <span class="material-symbols-outlined">trending_up</span>
        </div>
        <span class="nav-label">Upgrade</span>
      </button>
      <button class="nav-btn" data-screen="career">
        <div class="nav-icon-wrap">
          <span class="material-symbols-outlined">work</span>
        </div>
        <span class="nav-label">Career</span>
      </button>
    </nav>

    <!-- Tutorial Overlay -->
    <div id="tutorial-overlay" class="tutorial-overlay">
      <div id="tutorial-spotlight" class="tutorial-spotlight"></div>
      <div id="tutorial-bubble" class="tutorial-bubble"></div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-message" id="modal-message"></div>
        <div class="modal-buttons" id="modal-buttons"></div>
      </div>
    </div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="js/format.js"></script>
  <script src="js/state.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/model.js"></script>
  <script src="js/production.js"></script>
  <script src="js/upgrade.js"></script>
  <script src="js/research.js"></script>
  <script src="js/career.js"></script>
  <script src="js/challenge.js"></script>
  <script src="js/fusion.js"></script>
  <script src="js/events.js"></script>
  <script src="js/offline.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ads.js"></script>
  <script src="js/hints.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/debug.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
